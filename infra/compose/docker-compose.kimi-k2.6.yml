services:
  vllm:
    image: vllm/vllm-openai:v0.20.0-cu130
    container_name: vllm-kimi-k2-6
    restart: unless-stopped

    privileged: true
    ipc: host

    ports:
      - "${VLLM_HOST_PORT:-8000}:8000"

    ulimits:
      memlock: -1
      stack: 67108864

    environment:
      HUGGING_FACE_HUB_TOKEN: ${HF_TOKEN:?set HF_TOKEN in .env}
      HF_HUB_ENABLE_HF_TRANSFER: "1"
      VLLM_WORKER_MULTIPROC_METHOD: spawn
      NCCL_CUMEM_ENABLE: "1"
      NCCL_NVLS_ENABLE: "1"

    volumes:
      - hf-cache:/root/.cache/huggingface

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    command:
      - ${MODEL_NAME:-moonshotai/Kimi-K2.6}
      - --served-model-name=${SERVED_MODEL_NAME:-kimi-k2.6}
      - --host=0.0.0.0
      - --port=8000
      - --trust-remote-code
      - --enable-expert-parallel
      - --data-parallel-size=${DATA_PARALLEL_SIZE:-8}
      - --tool-call-parser=kimi_k2
      - --reasoning-parser=kimi_k2
      - --enable-auto-tool-choice
      - --mm-encoder-tp-mode=data
      - --speculative-config={"model":"${SPECULATIVE_MODEL:-lightseekorg/kimi-k2.6-eagle3-mla}","method":"eagle3","num_speculative_tokens":${NUM_SPECULATIVE_TOKENS:-3}}
      - --max-model-len=${MAX_MODEL_LEN:-65536}
      - --max-num-batched-tokens=${MAX_NUM_BATCHED_TOKENS:-16384}
      - --max-num-seqs=${MAX_NUM_SEQS:-256}
      - --gpu-memory-utilization=${GPU_MEMORY_UTILIZATION:-0.90}

    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 60
      start_period: 30m

    networks:
      - nanoserve-net

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: unless-stopped

    depends_on:
      vllm:
        condition: service_started

    ports:
      - "${OPEN_WEBUI_HOST_PORT:-3000}:8080"

    environment:
      ENABLE_OPENAI_API: "true"
      OPENAI_API_BASE_URLS: "http://vllm:8000/v1"
      OPENAI_API_KEYS: "${OPENWEBUI_OPENAI_API_KEY:-dummy}"

    volumes:
      - open-webui-data:/app/backend/data

    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 2m

    networks:
      - nanoserve-net

volumes:
  hf-cache:
    name: nanoserve-hf-cache
  open-webui-data:
    name: open-webui-data

networks:
  nanoserve-net:
    name: nanoserve-net
