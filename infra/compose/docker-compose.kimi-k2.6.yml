# vLLM 0.20.0 (CUDA 13) - Kimi-K2.6 single-node DEP (DP + EP)
#
# Target host: ubuntusrv2 (Ubuntu 24.04, 8x NVIDIA H200 NVL 143 GB,
# driver 595.58.03 / CUDA 13.2, Docker 28.5, Compose v2.39).
# Strategy: https://recipes.vllm.ai/moonshotai/Kimi-K2.6?strategy=single_node_dep
#
# Usage:
#   cd infra/compose
#   cp .env.example .env       # set HF_TOKEN
#   docker compose -f docker-compose.kimi-k2.6.yml up -d
#   docker compose -f docker-compose.kimi-k2.6.yml logs -f vllm
#
# Smoke test from host:
#   curl http://localhost:8000/v1/models
#   curl http://localhost:8000/v1/chat/completions \
#     -H 'Content-Type: application/json' \
#     -d '{"model":"kimi-k2.6","messages":[{"role":"user","content":"ping"}]}'

services:
  vllm:
    image: vllm/vllm-openai:v0.20.0-cu130
    container_name: vllm-kimi-k2-6
    restart: unless-stopped

    privileged: true
    ipc: host

    ports:
      - "${VLLM_HOST_PORT:-8000}:8000"

    ulimits:
      memlock: -1
      stack: 67108864

    environment:
      HUGGING_FACE_HUB_TOKEN: ${HF_TOKEN:?set HF_TOKEN in .env}
      HF_HUB_ENABLE_HF_TRANSFER: "1"
      VLLM_WORKER_MULTIPROC_METHOD: spawn
      NCCL_CUMEM_ENABLE: "1"
      NCCL_NVLS_ENABLE: "1"

    volumes:
      - hf-cache:/root/.cache/huggingface

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    # Command mirrors the official vLLM recipe exactly, plus --host/--port and
    # --served-model-name for Compose manageability.
    # Eagle3 MTP speculative decoding is enabled by default (matches the recipe).
    # To disable Eagle3 (e.g. if the checkpoint is not in cache yet), comment
    # out the --speculative-config line below.
    command:
      - ${MODEL_NAME:-moonshotai/Kimi-K2.6}
      - --served-model-name=${SERVED_MODEL_NAME:-kimi-k2.6}
      - --host=0.0.0.0
      - --port=8000
      - --trust-remote-code
      - --enable-expert-parallel
      - --data-parallel-size=8
      - --tool-call-parser=kimi_k2
      - --reasoning-parser=kimi_k2
      - --enable-auto-tool-choice
      - --mm-encoder-tp-mode=data
      - "--speculative-config={\"model\":\"lightseekorg/kimi-k2.6-eagle3-mla\",\"method\":\"eagle3\",\"num_speculative_tokens\":3}"
      - --max-model-len=${MAX_MODEL_LEN:-65536}
      - --max-num-batched-tokens=${MAX_NUM_BATCHED_TOKENS:-16384}
      - --max-num-seqs=${MAX_NUM_SEQS:-256}
      - --gpu-memory-utilization=${GPU_MEMORY_UTILIZATION:-0.90}

    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 60
      start_period: 30m

volumes:
  hf-cache:
    name: nanoserve-hf-cache
