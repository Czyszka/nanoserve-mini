services:
  vllm:
    image: vllm/vllm-openai:latest-cu130-ubuntu2404
    container_name: vllm-kimi-k2-6
    restart: unless-stopped

    privileged: true
    ipc: host

    ports:
      - "${VLLM_HOST_PORT:-8000}:8000"

    ulimits:
      memlock: -1
      stack: 67108864

    environment:
      HUGGING_FACE_HUB_TOKEN: ${HF_TOKEN:?set HF_TOKEN in .env}
      HF_HUB_ENABLE_HF_TRANSFER: "1"
      VLLM_WORKER_MULTIPROC_METHOD: spawn
      NCCL_CUMEM_ENABLE: "1"
      NCCL_NVLS_ENABLE: "1"

    volumes:
      - /home/ubuntusrv2/.vllm/models:/root/.cache/huggingface

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    command:
      -- model moonshotai/Kimi-K2.6 --served-model-name=kimi-k2.6 --host=0.0.0.0 --port=8000 --trust-remote-code --enable-expert-parallel --data-parallel-size=8 --tool-call-parser=kimi_k2 --reasoning-parser=kimi_k2 --enable-auto-tool-choice --language-model-only --speculative-config={"model":"lightseekorg/kimi-k2.6-eagle3-mla","method":"eagle3","num_speculative_tokens":3}

    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 60
      start_period: 30m

    networks:
      - nanoserve-net
  vllm-small:
    image: vllm/vllm-openai:latest-cu130-ubuntu2404
    container_name: vllm-small
    privileged: true
    ipc: host
    ports:
      - "8004:8004"
    volumes:
      - /home/ubuntusrv2/.vllm/models:/root/.cache/huggingface
    command:
      --model deepseek-ai/DeepSeek-V4-Flash --served-model-name=${SERVED_MODEL_NAME:-DeepSeek-V4-Flash} --host=0.0.0.0 --port=8004 --trust-remote-code --kv-cache-dtype fp8 --block-size 256 --tensor-parallel-size 8 --no-enable-flashinfer-autotune --tokenizer-mode deepseek_v4 --tool-call-parser deepseek_v4 --enable-auto-tool-choice --reasoning-parser deepseek_v4 --max-model-len 65536 --max-num-seqs 2 --max-num-batched-tokens 4096 --gpu-memory-utilization 0.20 --enforce-eager --no-disable-hybrid-kv-cache-manager --speculative_config '{"method":"mtp","num_speculative_tokens":1}'   
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8004/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 60
      start_period: 30m
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - nanoserve-net
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: unless-stopped

    depends_on:
      vllm:
        condition: service_started

    ports:
      - "${OPEN_WEBUI_HOST_PORT:-3000}:8080"

    environment:
      TZ: "Europe/Warsaw"
      ENABLE_OPENAI_API: "true"
      OPENAI_API_BASE_URLS: "http://vllm:8000/v1"
      OPENAI_API_KEYS: "${OPENWEBUI_OPENAI_API_KEY:-dummy}"

    volumes:
      - /home/ubuntusrv2/working/openwebui:/app/backend/data

    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 2m

    networks:
      - nanoserve-net

networks:
  nanoserve-net:
    name: nanoserve-net
