# Quick observability stack for the server session.
# Image tags can be overridden from .env without editing this file:
#   PROMETHEUS_IMAGE=prom/prometheus:<tag>
#   GRAFANA_IMAGE=grafana/grafana:<tag>
services:
  prometheus:
    image: "${PROMETHEUS_IMAGE:-prom/prometheus:v3}"
    container_name: prometheus
    hostname: prometheus
    restart: unless-stopped
    ports:
      - "${PROMETHEUS_HOST_PORT:-9090}:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    networks:
      - nanoserve-net

  grafana:
    image: "${GRAFANA_IMAGE:-grafana/grafana:latest}"
    container_name: grafana
    hostname: grafana
    restart: unless-stopped
    ports:
      - "${GRAFANA_HOST_PORT:-3001}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: "${GRAFANA_ADMIN_USER:-admin}"
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD:-admin}"
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    networks:
      - nanoserve-net

volumes:
  prometheus-data:
  grafana-data:

networks:
  nanoserve-net:
    external: true
