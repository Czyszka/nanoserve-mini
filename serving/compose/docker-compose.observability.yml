services:
  prometheus:
    image: prom/prometheus:v3
    container_name: prometheus
    hostname: prometheus
    restart: unless-stopped
    ports:
      - "${PROMETHEUS_HOST_PORT:-9090}:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - /home/ubuntusrv2/working/nanoserve-observability/prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    networks:
      - nanoserve-net

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    hostname: grafana
    restart: unless-stopped
    ports:
      - "${GRAFANA_HOST_PORT:-3001}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: "${GRAFANA_ADMIN_USER:-admin}"
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD:-admin}"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_RENDERING_SERVER_URL: "http://renderer:8081/render"
      GF_RENDERING_CALLBACK_URL: "http://grafana:3000/"
      GF_RENDERING_RENDERER_TOKEN: "${GRAFANA_RENDERER_TOKEN:?set GRAFANA_RENDERER_TOKEN in .env}"
    volumes:
      - /home/ubuntusrv2/working/nanoserve-observability/grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
      - renderer
    networks:
      - nanoserve-net

  renderer:
    image: grafana/grafana-image-renderer:latest
    container_name: grafana-image-renderer
    hostname: renderer
    restart: unless-stopped
    environment:
      AUTH_TOKEN: "${GRAFANA_RENDERER_TOKEN:?set GRAFANA_RENDERER_TOKEN in .env}"
    networks:
      - nanoserve-net

networks:
  nanoserve-net:
    external: true
