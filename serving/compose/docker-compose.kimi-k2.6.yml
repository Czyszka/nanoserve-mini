# Images pinned to readable version tags on 2026-05-17.
# Bump by editing the tag and re-running `docker compose pull`.
# For bit-perfect reproducibility between benchmark runs, capture
# `docker images --digests` into the run-id directory at run time.
services:
  vllm:
    image: vllm/vllm-openai:v0.20.0-cu130-ubuntu2404
    container_name: vllm
    hostname: vllm
    restart: unless-stopped

    privileged: true
    ipc: host

    ports:
      - "${VLLM_HOST_PORT:-8000}:8000"

    ulimits:
      memlock: -1
      stack: 67108864

    environment:
      HUGGING_FACE_HUB_TOKEN: ${HF_TOKEN:?set HF_TOKEN in .env}
      HF_HUB_ENABLE_HF_TRANSFER: "1"
      VLLM_WORKER_MULTIPROC_METHOD: spawn
      NCCL_CUMEM_ENABLE: "1"
      NCCL_NVLS_ENABLE: "1"

    volumes:
      - /home/ubuntusrv2/.vllm/models:/root/.cache/huggingface

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    command:
      --model moonshotai/Kimi-K2.6 --served-model-name=kimi-k2.6 --host=0.0.0.0 --port=8000 --trust-remote-code --enable-expert-parallel --tensor-parallel-size 8 --gpu-memory-utilization 0.6 --tool-call-parser=kimi_k2 --reasoning-parser=kimi_k2 --enable-auto-tool-choice --language-model-only --max-num-seqs 32 --max-model-len 131072 --max-num-batched-tokens 4096 --speculative-config='{"model":"lightseekorg/kimi-k2.6-eagle3-mla","method":"eagle3","num_speculative_tokens":3,"max_model_len":8192}' 

    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 60
      start_period: 30m

    networks:
      - nanoserve-net
  vllm-small:
    image: vllm/vllm-openai:v0.20.0-cu130-ubuntu2404
    container_name: vllm-small
    restart: unless-stopped
    privileged: true
    ipc: host
    ports:
      - "8004:8004"
    ulimits:
      memlock: -1
      stack: 67108864
    environment:
      HUGGING_FACE_HUB_TOKEN: ${HF_TOKEN:?set HF_TOKEN in .env}
      HF_HUB_ENABLE_HF_TRANSFER: "1"
      VLLM_WORKER_MULTIPROC_METHOD: spawn
      NCCL_CUMEM_ENABLE: "1"
      NCCL_NVLS_ENABLE: "1"
    volumes:
      - /home/ubuntusrv2/.vllm/models:/root/.cache/huggingface
    command:
      --model deepseek-ai/DeepSeek-V4-Flash --served-model-name=${SERVED_MODEL_NAME:-DeepSeek-V4-Flash} --host=0.0.0.0 --port=8004 --trust-remote-code --kv-cache-dtype fp8 --block-size 256 --tensor-parallel-size 8 --no-enable-flashinfer-autotune --tokenizer-mode deepseek_v4 --tool-call-parser deepseek_v4 --enable-auto-tool-choice --reasoning-parser deepseek_v4 --max-model-len 65536 --max-num-seqs 2 --max-num-batched-tokens 2048 --gpu-memory-utilization ${DEEPSEEK_GPU_MEM_UTIL:-0.2} --enforce-eager --no-disable-hybrid-kv-cache-manager --speculative_config '{"method":"mtp","num_speculative_tokens":1,"max_model_len":8192}'
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8004/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 60
      start_period: 30m
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - nanoserve-net
  litellm:
    image: ghcr.io/berriai/litellm:main-v1.66.0-stable
    container_name: litellm-proxy
    hostname: llmproxy
    restart: unless-stopped
    depends_on:
      vllm:
        condition: service_started
      vllm-small:
        condition: service_started
    ports:
      - "${LITELLM_HOST_PORT:-4000}:4000"
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:?set LITELLM_MASTER_KEY in .env}
      LITELLM_LOG: INFO
    volumes:
      - ./litellm-config.yaml:/etc/litellm/config.yaml:ro
    command:
      ["--config", "/etc/litellm/config.yaml", "--port", "4000", "--num_workers", "1"]
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:4000/health/liveliness')\" || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 1m
    networks:
      - nanoserve-net
  open-webui:
    image: ghcr.io/open-webui/open-webui:0.9.5
    container_name: open-webui
    hostname: openwebui
    restart: unless-stopped

    depends_on:
      vllm:
        condition: service_started

    ports:
      - "${OPEN_WEBUI_HOST_PORT:-3000}:8080"

    environment:
      TZ: "Europe/Warsaw"
      ENABLE_OPENAI_API: "true"
      OPENAI_API_BASE_URLS: "http://vllm:8000/v1"
      OPENAI_API_KEYS: "${OPENWEBUI_OPENAI_API_KEY:-dummy}"

    volumes:
      - /home/ubuntusrv2/working/openwebui:/app/backend/data

    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 2m

    networks:
      - nanoserve-net

networks:
  nanoserve-net:
    name: nanoserve-net
