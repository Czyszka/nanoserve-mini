services:
  vllm:
    image: vllm/vllm-openai:v0.20.0-cu130-ubuntu2404
    container_name: vllm
    hostname: vllm
    restart: unless-stopped

    privileged: true
    ipc: host

    ports:
      - "${VLLM_HOST_PORT:-8000}:8000"
    ulimits:
      memlock: -1
      stack: 67108864
    environment:
      HUGGING_FACE_HUB_TOKEN: ${HF_TOKEN:?set HF_TOKEN in .env}
      HF_HUB_ENABLE_HF_TRANSFER: "1"
      VLLM_WORKER_MULTIPROC_METHOD: spawn
      NCCL_CUMEM_ENABLE: "1"
      NCCL_NVLS_ENABLE: "1"
      CUDA_VISIBLE_DEVICES: "${QWEN_CUDA_VISIBLE_DEVICES:-0,1,2,3,4,5,6,7}"
    volumes:
      - /home/ubuntusrv2/.vllm/models:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    command:
      --model Qwen/Qwen3.6-35B-A3B --served-model-name=${QWEN_SERVED_MODEL_NAME:-Qwen3.6} --host=0.0.0.0 --port=8000 --trust-remote-code --enable-expert-parallel --tensor-parallel-size ${QWEN_TP:-8} --enable-auto-tool-choice --tool-call-parser qwen3_coder --reasoning-parser qwen3 --speculative-config='{"method":"mtp","num_speculative_tokens":${QWEN_NUM_SPECULATIVE_TOKENS:-3},"max_model_len":${QWEN_SPEC_MAX_MODEL_LEN:-8192}}' --mm-encoder-tp-mode data --max-model-len ${QWEN_MAX_MODEL_LEN:-65536} --max-num-seqs ${QWEN_MAX_NUM_SEQS:-32} --max-num-batched-tokens ${QWEN_MAX_NUM_BATCHED_TOKENS:-8192} --gpu-memory-utilization ${QWEN_GPU_MEM_UTIL:-0.9}

    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 60
      start_period: 30m

    networks:
      - nanoserve-net

networks:
  nanoserve-net:
    name: nanoserve-net

