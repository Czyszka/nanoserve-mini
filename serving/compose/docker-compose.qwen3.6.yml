services:
  vllm:
    image: vllm/vllm-openai:v0.20.0-cu130-ubuntu2404
    container_name: vllm
    restart: unless-stopped
    privileged: true
    ipc: host
    ports:
      - "8000:8000"
    ulimits:
      memlock: -1
      stack: 67108864
    environment:
      HUGGING_FACE_HUB_TOKEN: ${HF_TOKEN:?set HF_TOKEN in .env}
      HF_HUB_ENABLE_HF_TRANSFER: "1"
      VLLM_WORKER_MULTIPROC_METHOD: spawn
      NCCL_CUMEM_ENABLE: "1"
      NCCL_NVLS_ENABLE: "1"
    volumes:
      - /home/ubuntusrv2/.vllm/models:/root/.cache/huggingface
    command:
        --model Qwen/Qwen3.6-35B-A3B --served-model-name=${SERVED_MODEL_NAME:-Qwen3.6} --host=0.0.0.0 --port=8000 --trust-remote-code   --tensor-parallel-size 2 --enable-expert-parallel --enable-auto-tool-choice --max-model-len 65536 --max-num-seqs 32 --gpu-memory-utilization 0.9 --tool-call-parser qwen3_coder --reasoning-parser qwen3 --mm-encoder-tp-mode data --speculative-config '{"method":"mtp","num_speculative_tokens":3, "max_model_len":8192}'
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 60
      start_period: 30m
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - nanoserve-net
networks:
  nanoserve-net:
    external: true
