global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: "vllm-kimi"
    metrics_path: /metrics
    static_configs:
      - targets: ["vllm:8000"]

  - job_name: "vllm-small-deepseek"
    metrics_path: /metrics
    static_configs:
      - targets: ["vllm-small:8004"]

  - job_name: "litellm"
    metrics_path: /metrics
    static_configs:
      - targets: ["litellm-proxy:4000"]
