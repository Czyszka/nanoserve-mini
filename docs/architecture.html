<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>nanoserve-mini — Interactive Architecture</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.29.2/cytoscape.min.js"></script>
<style>
:root {
  --bg: #0d1117; --surface: #161b22; --surface2: #21262d; --border: #30363d;
  --text: #c9d1d9; --text-dim: #8b949e; --text-bright: #f0f6fc;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; font-size: 13px; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

/* ── header ── */
#header { padding: 9px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 14px; flex-shrink: 0; }
#header h1 { font-size: 15px; font-weight: 600; color: var(--text-bright); }
#header .sub { font-size: 12px; color: var(--text-dim); }

/* ── toolbar ── */
#toolbar { padding: 7px 12px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 6px; flex-shrink: 0; flex-wrap: wrap; }
.btn { background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 4px 10px; border-radius: 6px; font-size: 11px; cursor: pointer; white-space: nowrap; transition: border-color .15s, color .15s; }
.btn:hover { border-color: #58a6ff; color: #58a6ff; }
.btn.on { background: #1f6feb22; border-color: #1f6feb; color: #79c0ff; }
.sep { width: 1px; height: 18px; background: var(--border); }

/* ── legend ── */
#legend { display: flex; gap: 10px; align-items: center; margin-left: auto; flex-wrap: wrap; }
.leg { display: flex; align-items: center; gap: 4px; font-size: 11px; color: var(--text-dim); }
.leg-dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }

/* ── main ── */
#main { display: flex; flex: 1; overflow: hidden; }
#cy { flex: 1; height: 100%; background: var(--bg); }

/* ── panel ── */
#panel { width: 290px; background: var(--surface); border-left: 1px solid var(--border); overflow-y: auto; flex-shrink: 0; display: none; }
#panel.open { display: flex; flex-direction: column; }
#ph { padding: 11px 14px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
#ph-title { font-size: 14px; font-weight: 600; color: var(--text-bright); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
#ph-close { background: none; border: none; color: var(--text-dim); cursor: pointer; font-size: 16px; padding: 0 4px; line-height: 1; }
#ph-close:hover { color: var(--text-bright); }
#pb { padding: 12px 14px; flex: 1; }

.badge { display: inline-block; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; padding: 2px 7px; border-radius: 3px; margin-bottom: 8px; }
.psub { font-size: 12px; color: var(--text-dim); margin-bottom: 10px; }
.psh { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; color: var(--text-dim); margin: 10px 0 5px; }
.prow { display: flex; gap: 6px; margin-bottom: 3px; font-size: 12px; }
.pk { color: var(--text-dim); min-width: 74px; flex-shrink: 0; }
.pv { color: var(--text); font-family: monospace; word-break: break-all; }
.plist { list-style: none; }
.plist li { font-size: 11px; font-family: monospace; color: var(--text-dim); padding: 1px 0; }
.plist li::before { content: '→ '; color: var(--border); }
.conn { display: flex; align-items: center; gap: 6px; padding: 4px 0; font-size: 11px; border-bottom: 1px solid var(--border); }
.conn:last-child { border-bottom: none; }
.cdot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.cname { color: var(--text); font-weight: 500; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.cdir { color: var(--text-dim); font-size: 10px; flex-shrink: 0; }
.clabel { color: var(--text-dim); font-family: monospace; font-size: 10px; margin-left: auto; flex-shrink: 0; }

.hint { font-size: 10px; color: var(--border); margin-left: 4px; }
</style>
</head>
<body>

<div id="header">
  <h1>nanoserve-mini</h1>
  <span class="sub">Interactive architecture · Phase 1 · 8×H200 NVL</span>
  <span class="hint" style="color:var(--text-dim);">click a node for details · drag to rearrange · scroll to zoom</span>
</div>

<div id="toolbar">
  <button class="btn on"  id="f-all"       onclick="filt('all')">All</button>
  <button class="btn"     id="f-inference"  onclick="filt('inference')">Inference stack</button>
  <button class="btn"     id="f-obs"        onclick="filt('obs')">Observability</button>
  <button class="btn"     id="f-bench"      onclick="filt('bench')">Benchmark</button>
  <button class="btn"     id="f-modules"    onclick="filt('modules')">Modules</button>
  <div class="sep"></div>
  <button class="btn on"  id="t-uses"       onclick="toggleUses()">Module edges on</button>
  <button class="btn"                       onclick="cy.fit(cy.elements(':visible'), 40)">Fit</button>
  <div id="legend">
    <div class="leg"><span class="leg-dot" style="background:#1f6feb"></span>GPU service</div>
    <div class="leg"><span class="leg-dot" style="background:#2ea043"></span>Proxy</div>
    <div class="leg"><span class="leg-dot" style="background:#da3633"></span>UI</div>
    <div class="leg"><span class="leg-dot" style="background:#9e6a03"></span>Observability</div>
    <div class="leg"><span class="leg-dot" style="background:#6e40c9"></span>Orchestrator</div>
    <div class="leg"><span class="leg-dot" style="background:#1158c7"></span>Script</div>
    <div class="leg"><span class="leg-dot" style="background:#484f58"></span>Module / Ext</div>
  </div>
</div>

<div id="main">
  <div id="cy"></div>
  <div id="panel">
    <div id="ph">
      <span id="ph-title">Details</span>
      <button id="ph-close" onclick="closePanel()">✕</button>
    </div>
    <div id="pb"></div>
  </div>
</div>

<script>
// ── colours ──────────────────────────────────────────────────────────────────
const NC = { // node background
  'gpu-service':   '#1a2a40',
  'proxy':         '#162312',
  'ui':            '#2d1614',
  'observability': '#2b1f06',
  'orchestrator':  '#1e1535',
  'script':        '#0f1d35',
  'module':        '#161b22',
  'external':      '#161b22',
  'storage':       '#161b22',
};
const NTC = { // node text / border accent
  'gpu-service':   '#79c0ff',
  'proxy':         '#56d364',
  'ui':            '#ff7b72',
  'observability': '#e3b341',
  'orchestrator':  '#d2a8ff',
  'script':        '#79c0ff',
  'module':        '#6e7681',
  'external':      '#6e7681',
  'storage':       '#6e7681',
};
const EC = { // edge colours
  orchestrate: '#6e40c9', http: '#1f6feb', proxy: '#2ea043',
  scrape: '#9e6a03', query: '#e3b341', subprocess: '#484f58',
  writes: '#da3633', mount: '#30363d', uses: '#21262d',
};

// ── nodes ────────────────────────────────────────────────────────────────────
const nodes = [
  // Inference
  { data: { id:'vllm',        label:'vllm\n:8000',          type:'gpu-service',  group:'inference',
      d:{ title:'vllm', sub:'GPU inference service',
          rows:[['Port','8000'],['Image','vllm/vllm-openai:v0.20.0'],['Model','moonshotai/Kimi-K2.6'],['Served as','kimi-k2.6'],['TP','8 GPUs'],['GPU util','70%'],['Speculative','Eagle3 (3 tokens)']],
          lists:{'Endpoints':['/v1/chat/completions','/metrics','/v1/models']} } },
    position:{x:100,y:140} },
  { data: { id:'vllm-small',  label:'vllm-small\n:8004',    type:'gpu-service',  group:'inference',
      d:{ title:'vllm-small', sub:'GPU inference service',
          rows:[['Port','8004'],['Image','vllm/vllm-openai:v0.20.0'],['Model','deepseek-ai/DeepSeek-V4-Flash'],['Served as','DeepSeek-V4-Flash'],['TP','8 GPUs'],['GPU util','20%'],['KV cache dtype','fp8'],['Max len','65536 tokens'],['Speculative','MTP (1 token)']],
          lists:{'Endpoints':['/v1/chat/completions','/metrics']} } },
    position:{x:100,y:290} },
  { data: { id:'litellm',     label:'litellm-proxy\n:4000', type:'proxy',        group:'inference',
      d:{ title:'LiteLLM Proxy', sub:'OpenAI-compatible multi-model router',
          rows:[['Port','4000'],['Image','ghcr.io/berriai/litellm:main-v1.66.0'],['Auth','LITELLM_MASTER_KEY'],['Timeout','600 s']],
          lists:{'Routes':['kimi-k2.6 → vllm:8000/v1','DeepSeek-V4-Flash → vllm-small:8004/v1']} } },
    position:{x:100,y:430} },
  { data: { id:'open-webui',  label:'open-webui\n:3000',    type:'ui',           group:'inference',
      d:{ title:'Open WebUI', sub:'Chat interface',
          rows:[['Port','3000'],['Image','open-webui:0.9.5'],['Upstream','http://vllm:8000']] } },
    position:{x:100,y:560} },
  { data: { id:'hf-cache',    label:'HF model\ncache',      type:'storage',      group:'storage',
      d:{ title:'HuggingFace Model Cache', sub:'Persistent volume mount',
          rows:[['Host path','/home/ubuntusrv2/.vllm/models'],['Container','/root/.cache/huggingface'],['Used by','vllm + vllm-small']] } },
    position:{x:100,y:695} },

  // Observability
  { data: { id:'prometheus',  label:'Prometheus\n:9090',    type:'observability', group:'obs',
      d:{ title:'Prometheus', sub:'TSDB + metrics scraper',
          rows:[['Port','9090'],['Image','prom/prometheus:v3'],['Scrape interval','5 s'],['Data path','~/working/nanoserve-observability/prometheus-data']],
          lists:{'Scrape targets':['vllm:8000/metrics  (job: vllm-kimi)','vllm-small:8004/metrics  (job: vllm-small-deepseek)','litellm-proxy:4000/metrics  (job: litellm)']} } },
    position:{x:1080,y:175} },
  { data: { id:'grafana',     label:'Grafana\n:3001',       type:'observability', group:'obs',
      d:{ title:'Grafana', sub:'Dashboard & visualization',
          rows:[['Port','3001'],['Image','grafana/grafana:latest'],['Datasource','Prometheus'],['Dashboard','vllm-phase1.json (provisioned)'],['Status','⚠ panel names need live-metric validation']] } },
    position:{x:1080,y:380} },

  // Benchmark orchestrator
  { data: { id:'run-bench-suite', label:'run_bench_suite', type:'orchestrator', group:'bench',
      d:{ title:'run_bench_suite.py', sub:'Full Phase 1 benchmark orchestrator',
          rows:[['Run-id','YYYY-MM-DD_<model>_run-NN'],['Output','bench_suite/summary.json']],
          lists:{'Sequence':['collect_metrics_snapshot (pre)','request_once','measure_ttft_once','sample_gpu_metrics [background]','run_sequential_benchmark','collect_metrics_snapshot (post)']} } },
    position:{x:380,y:250} },

  // Benchmark scripts
  { data: { id:'request-once',    label:'request_once',          type:'script', group:'bench',
      d:{ title:'request_once.py', sub:'Correctness smoke test',
          rows:[['Mode','singlestream_lite_correctness'],['Schema','nanoserve-mini.request-once.v2'],['Stream','no'],['Output','singlestream_lite_correctness/result.json']],
          lists:{'Metrics':['e2e_seconds','output_chars','prompt_tokens','completion_tokens']} } },
    position:{x:640,y:90} },
  { data: { id:'measure-ttft',    label:'measure_ttft_once',     type:'script', group:'bench',
      d:{ title:'measure_ttft_once.py', sub:'Single-request latency measurement',
          rows:[['Mode','singlestream_lite_latency'],['Schema','nanoserve-mini.ttft-once.v2'],['Stream','yes'],['Output','singlestream_lite_latency/result.json']],
          lists:{'Metrics':['ttft_seconds (final-answer only)','ttft_any_token_seconds (incl. reasoning)','e2e_seconds','tpot_seconds','completion_tokens']} } },
    position:{x:640,y:210} },
  { data: { id:'run-seq',         label:'run_sequential\nbenchmark', type:'script', group:'bench',
      d:{ title:'run_sequential_benchmark.py', sub:'Repeated sequential requests',
          rows:[['Mode','singlestream_lite_repeated'],['Schema (sum.)','nanoserve-mini.sequential-bench.v3'],['Schema (row)','nanoserve-mini.sequential-bench-row.v3'],['Concurrency','1 (sequential)'],['Output','summary.json + results.jsonl']],
          lists:{'Metrics':['TTFT p50/p95','TPOT p50/p95','E2E p50/p95','request_throughput','output_throughput_tokens_s']} } },
    position:{x:640,y:335} },
  { data: { id:'collect-metrics', label:'collect_metrics\nsnapshot',  type:'script', group:'bench',
      d:{ title:'collect_metrics_snapshot.py', sub:'Server metrics snapshot',
          rows:[['Schema','nanoserve-mini.server-metrics-snapshot.v1'],['Phases','pre / mid / post / adhoc'],['Output','server_metrics/snapshot_<phase>.json']],
          lists:{'Metrics':['gpu_memory_used_gb (total)','kv_cache_usage (vLLM gauge)','prefix_cache_hit_rate','per-GPU: util, memory, temperature, power']} } },
    position:{x:640,y:455} },
  { data: { id:'sample-gpu',      label:'sample_gpu\nmetrics',        type:'script', group:'bench',
      d:{ title:'sample_gpu_metrics.py', sub:'Continuous GPU metric sampling',
          rows:[['Schema','nanoserve-mini.gpu-samples-meta.v1'],['Default interval','500 ms'],['Output','server_metrics/gpu_samples.csv']],
          lists:{'CSV columns':['tick, timestamp','gpu_index, gpu_name','utilization_gpu','memory_used_mib, memory_total_mib','temperature_gpu, power_draw_w','clock_sm_mhz, clock_mem_mhz']} } },
    position:{x:640,y:575} },
  { data: { id:'check-env',       label:'check_server_env',           type:'script', group:'bench',
      d:{ title:'check_server_env.py', sub:'Environment inventory snapshot',
          rows:[['Output','results/raw/server_env_snapshot.json']],
          lists:{'Checks':['git, python, uv, rg','uname, os-release, lscpu','memory, disk','nvidia-smi, nvcc','docker']} } },
    position:{x:640,y:690} },

  // Shared modules
  { data: { id:'_client',         label:'_client',         type:'module', group:'modules',
      d:{ title:'_client.py', sub:'httpx OpenAI-compatible HTTP client',
          lists:{'Exports':['CompletionRequest (dataclass)','build_payload(req, stream)','chat_completion(req)','chat_completion_stream(req) → Iterator','extract_assistant_text(response)','extract_stream_delta_text(chunk)','extract_stream_reasoning_text(chunk)','extract_stream_usage(chunk)']} } },
    position:{x:370,y:570} },
  { data: { id:'_metrics',        label:'_metrics',        type:'module', group:'modules',
      d:{ title:'_metrics.py', sub:'Benchmark Contract helpers',
          lists:{'Exports':['RunControls (dataclass, 17+ fields)','get_git_commit()','make_run_uuid()','now_iso()','null_server_metrics()','build_workload_spec(...)','resolve_output_path(run_id, mode, flag)','summarize(rows, percentiles=[50, 95])']} } },
    position:{x:370,y:680} },
  { data: { id:'_schemas',        label:'_schemas',        type:'module', group:'modules',
      d:{ title:'_schemas.py', sub:'Schema version constants',
          rows:[['METHODOLOGY','mlperf_inspired_lite']],
          lists:{
            'Benchmark modes':['singlestream_lite_correctness','singlestream_lite_latency','singlestream_lite_repeated'],
            'Schema IDs':['nanoserve-mini.request-once.v2','nanoserve-mini.ttft-once.v2','nanoserve-mini.sequential-bench.v3','nanoserve-mini.sequential-bench-row.v3','nanoserve-mini.server-metrics-snapshot.v1','nanoserve-mini.gpu-samples-meta.v1']
          } } },
    position:{x:490,y:570} },
  { data: { id:'_server_metrics', label:'_server_metrics', type:'module', group:'modules',
      d:{ title:'_server_metrics.py', sub:'Prometheus & nvidia-smi parsers',
          lists:{'Exports':['parse_prometheus_text(text) → dict','parse_nvidia_smi_csv(csv_lines) → list[dict]','select_vllm_aggregate(metric_map) → dict','total_gpu_memory_used_gb(smi_dicts) → float','NVIDIA_SMI_QUERY_FIELDS (tuple)','CSV_COLUMNS (tuple)']} } },
    position:{x:490,y:680} },

  // External + storage
  { data: { id:'nvidia-smi', label:'nvidia-smi', type:'external', group:'external',
      d:{ title:'nvidia-smi', sub:'NVIDIA System Management Interface (subprocess)',
          lists:{'Queried fields':['index, name','utilization.gpu, utilization.memory','memory.used, memory.free, memory.total','temperature.gpu, power.draw','clocks.current.sm, clocks.current.memory']} } },
    position:{x:880,y:550} },
  { data: { id:'results', label:'results/runs/', type:'storage', group:'storage',
      d:{ title:'Benchmark Results', sub:'Git-committed output artifacts',
          rows:[['Base path','results/runs/<run_id>/'],['Formats','JSON, JSONL, CSV'],['Policy','small files only; large → .gitignore']],
          lists:{'Subdirectories':['singlestream_lite_correctness/','singlestream_lite_latency/','singlestream_lite_repeated/','server_metrics/','bench_suite/']} } },
    position:{x:880,y:690} },
];

// ── edges ────────────────────────────────────────────────────────────────────
const edges = [
  // orchestrate
  {data:{id:'eo1', source:'run-bench-suite', target:'collect-metrics', label:'pre+post',   type:'orchestrate'}},
  {data:{id:'eo2', source:'run-bench-suite', target:'request-once',    label:'subprocess', type:'orchestrate'}},
  {data:{id:'eo3', source:'run-bench-suite', target:'measure-ttft',    label:'subprocess', type:'orchestrate'}},
  {data:{id:'eo4', source:'run-bench-suite', target:'run-seq',         label:'subprocess', type:'orchestrate'}},
  {data:{id:'eo5', source:'run-bench-suite', target:'sample-gpu',      label:'background', type:'orchestrate'}},
  // http: scripts → vllm
  {data:{id:'eh1', source:'request-once',    target:'vllm', label:'POST /v1/chat',   type:'http'}},
  {data:{id:'eh2', source:'measure-ttft',    target:'vllm', label:'stream POST',     type:'http'}},
  {data:{id:'eh3', source:'run-seq',         target:'vllm', label:'stream POST ×N',  type:'http'}},
  {data:{id:'eh4', source:'collect-metrics', target:'vllm', label:'GET /metrics',    type:'http'}},
  // proxy routing
  {data:{id:'ep1', source:'litellm', target:'vllm',       label:'kimi-k2.6',         type:'proxy'}},
  {data:{id:'ep2', source:'litellm', target:'vllm-small', label:'DeepSeek-V4-Flash', type:'proxy'}},
  // ui
  {data:{id:'eu1', source:'open-webui', target:'vllm', label:'upstream', type:'http'}},
  // prometheus scrape
  {data:{id:'es1', source:'prometheus', target:'vllm',       label:'scrape 5s', type:'scrape'}},
  {data:{id:'es2', source:'prometheus', target:'vllm-small', label:'scrape 5s', type:'scrape'}},
  {data:{id:'es3', source:'prometheus', target:'litellm',    label:'scrape 5s', type:'scrape'}},
  // grafana
  {data:{id:'eq1', source:'grafana', target:'prometheus', label:'PromQL', type:'query'}},
  // subprocess → nvidia-smi
  {data:{id:'esp1', source:'collect-metrics', target:'nvidia-smi', label:'subprocess',  type:'subprocess'}},
  {data:{id:'esp2', source:'sample-gpu',      target:'nvidia-smi', label:'@ 500 ms',    type:'subprocess'}},
  {data:{id:'esp3', source:'check-env',       target:'nvidia-smi', label:'subprocess',  type:'subprocess'}},
  // volume mounts
  {data:{id:'em1', source:'hf-cache', target:'vllm',       label:'volume', type:'mount'}},
  {data:{id:'em2', source:'hf-cache', target:'vllm-small', label:'volume', type:'mount'}},
  // results
  {data:{id:'ew1', source:'run-bench-suite', target:'results', label:'writes', type:'writes'}},
  // module uses
  {data:{id:'uc1',  source:'_client',         target:'request-once',    label:'', type:'uses'}},
  {data:{id:'uc2',  source:'_client',         target:'measure-ttft',    label:'', type:'uses'}},
  {data:{id:'uc3',  source:'_client',         target:'run-seq',         label:'', type:'uses'}},
  {data:{id:'um1',  source:'_metrics',        target:'request-once',    label:'', type:'uses'}},
  {data:{id:'um2',  source:'_metrics',        target:'measure-ttft',    label:'', type:'uses'}},
  {data:{id:'um3',  source:'_metrics',        target:'run-seq',         label:'', type:'uses'}},
  {data:{id:'um4',  source:'_metrics',        target:'collect-metrics', label:'', type:'uses'}},
  {data:{id:'us1',  source:'_schemas',        target:'request-once',    label:'', type:'uses'}},
  {data:{id:'us2',  source:'_schemas',        target:'measure-ttft',    label:'', type:'uses'}},
  {data:{id:'us3',  source:'_schemas',        target:'run-seq',         label:'', type:'uses'}},
  {data:{id:'us4',  source:'_schemas',        target:'collect-metrics', label:'', type:'uses'}},
  {data:{id:'usm1', source:'_server_metrics', target:'collect-metrics', label:'', type:'uses'}},
  {data:{id:'usm2', source:'_server_metrics', target:'sample-gpu',      label:'', type:'uses'}},
];

// ── cytoscape ────────────────────────────────────────────────────────────────
const cy = cytoscape({
  container: document.getElementById('cy'),
  elements: { nodes, edges },
  layout: { name: 'preset' },
  style: [
    {
      selector: 'node',
      style: {
        label: 'data(label)',
        'text-valign': 'center', 'text-halign': 'center',
        'font-size': '11px',
        'font-family': 'ui-monospace, "Cascadia Code", Consolas, monospace',
        'text-wrap': 'wrap', 'text-max-width': '118px',
        width: '122px', height: '46px',
        shape: 'roundrectangle',
        'background-color': ele => NC[ele.data('type')] || '#161b22',
        color: ele => NTC[ele.data('type')] || '#6e7681',
        'border-width': '1.5px',
        'border-color': ele => (NTC[ele.data('type')] || '#6e7681') + '55',
        'transition-property': 'opacity, border-color, border-width',
        'transition-duration': '150ms',
      }
    },
    { selector: 'node[type="orchestrator"]',
      style: { width:'134px', height:'52px', 'font-size':'12px', 'font-weight':'bold', 'border-width':'2px' } },
    { selector: 'node[type="module"]',
      style: { width:'114px', height:'36px', 'font-style':'italic' } },
    { selector: 'node[type="storage"]',
      style: { shape:'barrel', width:'114px', height:'46px' } },
    { selector: 'node[type="external"]',
      style: { shape:'diamond', width:'104px', height:'52px' } },
    { selector: 'node.highlighted',
      style: { 'border-color':'#f0f6fc', 'border-width':'2.5px', opacity:1 } },
    { selector: 'node.dimmed',
      style: { opacity: 0.12 } },

    // edges
    {
      selector: 'edge',
      style: {
        width: 1.5, 'curve-style': 'bezier',
        'line-color':         ele => EC[ele.data('type')] || '#30363d',
        'target-arrow-color': ele => EC[ele.data('type')] || '#30363d',
        'target-arrow-shape': 'triangle',
        label: '', 'font-size': '9px', color: '#8b949e',
        'text-background-color': '#0d1117', 'text-background-opacity': 1, 'text-background-padding': '2px',
        opacity: 0.55,
      }
    },
    { selector: 'edge[type="uses"]',
      style: { 'line-style':'dashed', 'line-dash-pattern':[4,4], opacity:0.3, width:1, 'target-arrow-shape':'none' } },
    { selector: 'edge[type="orchestrate"]',
      style: { width:2, opacity:0.7 } },
    { selector: 'edge.highlighted',
      style: { opacity:1, width:2.5, label:'data(label)', 'z-index':999 } },
    { selector: 'edge.dimmed',
      style: { opacity:0.04 } },
  ],
  minZoom: 0.15, maxZoom: 3, wheelSensitivity: 0.3,
});

// ── interactions ─────────────────────────────────────────────────────────────
let selected = null;

cy.on('tap', 'node', evt => {
  const n = evt.target;
  if (selected && selected.id() === n.id()) { closePanel(); return; }
  selected = n;
  cy.elements().addClass('dimmed').removeClass('highlighted');
  n.removeClass('dimmed').addClass('highlighted');
  n.connectedEdges().removeClass('dimmed').addClass('highlighted');
  n.neighborhood('node').removeClass('dimmed').addClass('highlighted');
  showPanel(n);
});

cy.on('tap', evt => { if (evt.target === cy) closePanel(); });

cy.on('mouseover', 'edge', evt => evt.target.addClass('highlighted'));
cy.on('mouseout',  'edge', evt => { if (!evt.target.source().hasClass('highlighted')) evt.target.removeClass('highlighted'); });

function closePanel() {
  selected = null;
  document.getElementById('panel').classList.remove('open');
  cy.elements().removeClass('dimmed highlighted');
}

// ── panel ─────────────────────────────────────────────────────────────────────
function showPanel(n) {
  const d    = n.data('d') || {};
  const type = n.data('type');
  const tc   = NTC[type] || '#6e7681';
  document.getElementById('ph-title').textContent = d.title || n.id();
  document.getElementById('panel').classList.add('open');

  const typeLabel = type.replace(/-/g,' ').replace(/\b\w/g, c=>c.toUpperCase());
  let h = `<span class="badge" style="background:${tc}22;color:${tc};border:1px solid ${tc}44">${typeLabel}</span>`;
  if (d.sub) h += `<div class="psub">${d.sub}</div>`;

  if (d.rows?.length) {
    h += '<div class="psh">Config</div>';
    for (const [k,v] of d.rows) h += `<div class="prow"><span class="pk">${k}</span><span class="pv">${v}</span></div>`;
  }
  if (d.lists) {
    for (const [title, items] of Object.entries(d.lists)) {
      h += `<div class="psh">${title}</div><ul class="plist">`;
      for (const item of items) h += `<li>${item}</li>`;
      h += '</ul>';
    }
  }

  const outs = n.outgoers('edge');
  const ins  = n.incomers('edge');
  if (outs.length + ins.length) {
    h += '<div class="psh">Connections</div>';
    outs.forEach(e => {
      const t = e.target(); const c = NTC[t.data('type')] || '#6e7681';
      h += `<div class="conn"><span class="cdot" style="background:${c}"></span><span class="cdir">→</span><span class="cname">${t.id()}</span><span class="clabel">${e.data('label')||e.data('type')}</span></div>`;
    });
    ins.forEach(e => {
      const s = e.source(); const c = NTC[s.data('type')] || '#6e7681';
      h += `<div class="conn"><span class="cdot" style="background:${c}"></span><span class="cdir">←</span><span class="cname">${s.id()}</span><span class="clabel">${e.data('label')||e.data('type')}</span></div>`;
    });
  }
  document.getElementById('pb').innerHTML = h;
}

// ── filters ───────────────────────────────────────────────────────────────────
function filt(group) {
  document.querySelectorAll('[id^="f-"]').forEach(b => b.classList.remove('on'));
  document.getElementById(`f-${group}`).classList.add('on');
  closePanel();
  if (group === 'all') {
    cy.elements().show();
  } else {
    cy.nodes().forEach(n => n.data('group') === group ? n.show() : n.hide());
    cy.edges().forEach(e => (e.source().visible() && e.target().visible()) ? e.show() : e.hide());
    setTimeout(() => cy.fit(cy.elements(':visible'), 50), 50);
  }
}

let usesOn = true;
function toggleUses() {
  usesOn = !usesOn;
  const btn = document.getElementById('t-uses');
  if (usesOn) { cy.edges('[type="uses"]').show(); btn.textContent='Module edges on';  btn.classList.add('on'); }
  else         { cy.edges('[type="uses"]').hide(); btn.textContent='Module edges off'; btn.classList.remove('on'); }
}

// ── init ─────────────────────────────────────────────────────────────────────
cy.ready(() => setTimeout(() => cy.fit(cy.elements(), 40), 80));
</script>
</body>
</html>
